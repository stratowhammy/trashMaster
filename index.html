<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trash Master — A 2D collection game where you clean up the city! Pick a character, collect trash, earn followers, and beat the clock.">
    <title>Trash Master — Clean Up the City!</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="ui-layer">
        <!-- Login Screen -->
        <div id="login-screen" class="screen">
            <h1>Trash Master</h1>
            <div class="panel">
                <h2>Login</h2>
                <input type="text" id="login-username" placeholder="Username">
                <input type="password" id="login-password" placeholder="Password">
                <button id="btn-login" class="btn">Login</button>
                <p id="login-error" class="error"></p>
            </div>
        </div>

        <!-- Admin Screen -->
        <div id="admin-screen" class="screen hidden">
            <h1>Admin Dashboard</h1>
            <div class="panel admin-panel">
                <h2>Generate Accounts</h2>
                <input type="number" id="admin-count" value="1" min="1" max="50">
                <button id="btn-generate" class="btn">Generate</button>
                <div id="generated-accounts" class="account-list"></div>
                <button id="btn-admin-logout" class="btn secondary">Logout</button>
            </div>
        </div>

        <!-- Store Screen -->
        <div id="store-screen" class="screen hidden">
            <h1>Trash Master Store</h1>
            <div class="store-layout">
                <div class="store-sidebar">
                    <h2 id="store-balance">$0</h2>
                    <div id="store-inventory"></div>
                    <div class="toggle-container">
                        <label class="switch">
                            <input type="checkbox" id="frenzy-toggle">
                            <span class="slider round"></span>
                        </label>
                        <span class="toggle-label" style="font-family: 'Press Start 2P', monospace; font-size: 8px; color: #fff; margin-left: 8px; vertical-align: middle;">Frenzy Mode</span>
                    </div>
                    <button id="btn-start-game" class="btn play-btn">Play Game</button>
                    <button id="btn-store-logout" class="btn secondary">Logout</button>
                </div>
                <div class="store-items">
                    <!-- Items populated dynamically -->
                </div>
            </div>
        </div>

        <!-- Pirate Defeat Screen -->
        <div id="pirate-defeat-screen" class="screen hidden" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #1a0505;">
            <h1 style="color: #ff3333; text-shadow: 0 0 10px rgba(255, 0, 0, 0.7); font-family: 'Press Start 2P', monospace; font-size: 20px; margin-bottom: 20px; text-align: center;">WASTED BY PIRATES</h1>
            <div class="defeat-container" style="display: flex; flex-direction: column; align-items: center; gap: 20px; background: rgba(0,0,0,0.6); padding: 25px; border: 3px solid #ff3333; border-radius: 8px;">
                <div id="defeat-art-container" style="width: 256px; height: 128px; border: 4px solid #ff3333; background: #000; image-rendering: pixelated;">
                    <canvas id="defeatArtCanvas" width="256" height="128" style="width: 256px; height: 128px; image-rendering: pixelated; display: block;"></canvas>
                </div>
                <p id="defeat-message" style="font-family: 'Press Start 2P', monospace; font-size: 9px; color: #ff8888; text-align: center; max-width: 320px; line-height: 1.8; margin: 10px 0;"></p>
                <button id="btn-defeat-return" class="btn play-btn" style="background: #ff3333; border: 2px solid #990000; box-shadow: 0 4px #660000; padding: 10px 20px; font-family: 'Press Start 2P', monospace; font-size: 10px; color: #fff; cursor: pointer;">Return to Store</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" tabindex="0" class="hidden"></canvas>

    <!-- Game scripts loaded in dependency order -->
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/camera.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/player.js"></script>
    <script src="js/follower.js"></script>
    <script src="js/trash.js"></script>
    <script src="js/minimap.js"></script>
    <script src="js/hud.js"></script>
    <script src="js/npc.js"></script>
    <script src="js/pirate.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
